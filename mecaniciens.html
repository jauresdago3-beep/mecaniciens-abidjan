<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MecanoAbidjan – Carte des services auto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --orange:#F4600C; --orange-light:#FF8A3D;
  --black:#0A0A0A; --dark:#1A1A1A; --grey:#2E2E2E;
  --white:#F5F3EE; --muted:#888; --green:#22C55E; --red:#EF4444; --blue:#3B82F6; --yellow:#F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);padding-bottom:70px;}
h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif;}

/* NAV fluide */
nav{background:var(--dark);border-bottom:1px solid var(--grey);padding:0 12px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:999;}
.brand{font-size:1.15rem;font-weight:700;color:var(--orange);cursor:pointer;letter-spacing:-.3px;}
.nav-links{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.nav-links::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:1px solid var(--grey);color:var(--white);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.78rem;font-family:'Inter',sans-serif;white-space:nowrap;transition:.2s;flex-shrink:0;}
.nav-btn:hover{border-color:var(--orange);color:var(--orange);}
.nav-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600;}
.nav-btn.primary:hover{background:var(--orange-light);}

/* PAGES */
.page{display:none;}
.page.active{display:block;}
.section{max-width:980px;margin:0 auto;padding:26px 14px;}
.section-title{font-size:1.3rem;font-weight:700;margin-bottom:16px;}
.section-title span{color:var(--orange);}

/* CARTE */
.map-toolbar{background:var(--dark);border-bottom:1px solid var(--grey);padding:7px 12px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.filter-btn{background:var(--grey);border:1px solid var(--grey);color:var(--white);padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.76rem;font-family:'Inter',sans-serif;white-space:nowrap;transition:.2s;}
.filter-btn.active,.filter-btn:hover{background:var(--orange);border-color:var(--orange);}
#map{flex:1;height:calc(100vh - 170px);min-height:420px;}

/* PANEL LATÉRAL */
.side-panel{width:320px;background:var(--dark);border-left:1px solid var(--grey);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.panel-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;color:var(--orange);border-bottom:1px solid var(--grey);padding-bottom:7px;margin-bottom:4px;}

/* FORMULAIRES */
.add-form{display:flex;flex-direction:column;gap:7px;}
.add-form input,.add-form select,.add-form textarea{width:100%;background:var(--grey);border:1px solid var(--grey);color:var(--white);padding:7px 10px;border-radius:7px;font-size:.8rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.add-form input:focus,.add-form select:focus,.add-form textarea:focus{border-color:var(--orange);}
.add-form textarea{min-height:50px;resize:vertical;}
.coord-display{font-size:.73rem;color:var(--muted);background:var(--grey);padding:6px 9px;border-radius:6px;border:1px dashed var(--grey);}
.coord-display.set{color:var(--green);border-color:var(--green);}

/* BOUTONS FLUIDES */
.btn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-size:.79rem;font-family:'Inter',sans-serif;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;flex-shrink:0;}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.2);}
.btn-orange{background:var(--orange);color:#fff;width:100%;}
.btn-orange:hover{background:var(--orange-light);}
.btn-outline{background:none;border:1px solid var(--grey);color:var(--white);}
.btn-outline:hover{border-color:var(--orange);color:var(--orange);}
.btn-success{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:4px 9px;font-size:.72rem;}

/* CARTES */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px;}
.card{background:var(--dark);border:1px solid var(--grey);border-radius:12px;padding:15px;transition:border-color .2s;}
.card:hover{border-color:var(--orange);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.card-name{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:600;}
.card-info{font-size:.78rem;color:var(--muted);margin-bottom:3px;display:flex;gap:4px;}
.card-actions{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:600;}
.badge.disponible{background:rgba(34,197,94,.15);color:var(--green);}
.badge.occupe{background:rgba(239,68,68,.15);color:var(--red);}
.badge.valide{background:rgba(244,96,12,.15);color:var(--orange);}
.badge.attente{background:rgba(245,158,11,.15);color:var(--yellow);}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.stars{color:var(--yellow);font-size:.8rem;margin:5px 0 2px;}
.avis-count{font-size:.7rem;color:var(--muted);}

/* MODAL AVIS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--dark);border:1px solid var(--grey);border-radius:14px;padding:22px;width:92%;max-width:400px;max-height:88vh;overflow-y:auto;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:.98rem;font-weight:700;margin-bottom:12px;}
.modal input,.modal textarea{width:100%;background:var(--grey);border:1px solid var(--grey);color:var(--white);padding:8px 11px;border-radius:7px;font-size:.8rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:7px;}
.modal textarea{min-height:58px;resize:vertical;}
.star-select{display:flex;gap:5px;font-size:1.4rem;margin:6px 0;cursor:pointer;}
.star-select span{color:var(--grey);transition:color .1s;}
.star-select span.on{color:var(--yellow);}

/* ALERTES */
.alert{padding:10px 13px;border-radius:8px;margin-bottom:12px;font-size:.8rem;line-height:1.4;}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.alert-info{background:rgba(244,96,12,.1);border:1px solid rgba(244,96,12,.3);color:var(--orange);}

/* PROFIL BADGE */
.profile-chip{display:inline-flex;align-items:center;gap:6px;background:var(--grey);border:1px solid var(--grey);border-radius:20px;padding:4px 12px;font-size:.78rem;}
.profile-chip .dot{background:var(--green);}

/* QR CODE */
.qr-box{display:inline-block;padding:15px;background:#fff;border-radius:12px;margin-top:12px;}

/* MOBILE */
@media(max-width:700px){
  .side-panel{display:none;}
  .cards-grid{grid-template-columns:1fr;}
  #map
