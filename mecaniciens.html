<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mécaniciens Abidjan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
        }

        header {
            background: #e94560;
            padding: 20px;
            text-align: center;
        }

        header h1 { font-size: 22px; }
        header p { font-size: 13px; opacity: 0.9; margin-top: 5px; }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #0f3460;
        }

        .stat { text-align: center; }
        .stat span {
            display: block;
            font-size: 26px;
            font-weight: bold;
            color: #e94560;
        }
        .stat p { font-size: 11px; color: #ccc; }

        .search {
            padding: 15px;
            background: #16213e;
        }

        .search input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e94560;
            background: #0f3460;
            color: white;
            font-size: 14px;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #16213e;
        }

        .nav-btns a {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-carte {
            background: #0f3460;
            color: white;
        }

        .btn-ajouter {
            background: #e94560;
            color: white;
        }

        .liste {
            padding: 15px;
        }

        .liste h2 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .carte-mec {
            background: #16213e;
            border-left: 4px solid #e94560;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
        }

        .carte-mec h3 {
            color: #e94560;
            font-size: 15px;
        }

        .carte-mec p {
            font-size: 13px;
            color: #ccc;
            margin: 3px 0;
        }

        .badge {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-top: 5px;
        }

        .chargement {
            text-align: center;
            padding: 30px;
            color: #ccc;
        }

        a.tel {
            color: #e94560;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <h1>🔧 Mécaniciens Abidjan</h1>
    <p>Trouvez un mécanicien moto près de vous</p>
</header>

<div class="stats">
    <div class="stat">
        <span id="totalMec">0</span>
        <p>Mécaniciens</p>
    </div>
    <div class="stat">
        <span id="totalQuartiers">0</span>
        <p>Quartiers</p>
    </div>
    <div class="stat">
        <span id="totalServices">0</span>
        <p>Services</p>
    </div>
</div>

<div class="search">
    <input type="text" id="recherche"
        placeholder="🔍 Rechercher par nom ou quartier..."
        oninput="filtrer()"/>
</div>

<div class="nav-btns">
    <a href="mecaniciens.html" class="btn-carte">🗺️ Voir la carte</a>
    <a href="mecaniciens.html" class="btn-ajouter">➕ Ajouter</a>
</div>

<div class="liste">
    <h2>📋 Liste des mécaniciens</h2>
    <div id="listeMec">
        <div class="chargement">⏳ Chargement...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>

const firebaseConfig = {
    apiKey: "VOTRE_API_KEY",
    authDomain: "mecaniciens-abidjan.firebaseapp.com",
    projectId: "mecaniciens-abidjan",
    storageBucket: "mecaniciens-abidjan.appspot.com",
    messagingSenderId: "VOTRE_ID",
    appId: "VOTRE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let tousLesMecs = [];

function chargerMecaniciens() {
    db.collection("mecaniciens").get()
        .then(snapshot => {
            tousLesMecs = [];
            snapshot.forEach(doc => {
                tousLesMecs.push({id: doc.id, ...doc.data()});
            });
            afficherListe(tousLesMecs);
            mettreAJourStats(tousLesMecs);
        })
        .catch(err => {
            document.getElementById("listeMec").innerHTML =
                "<p style='color:#e94560;text-align:center'>❌ Erreur de connexion</p>";
        });
}

function afficherListe(liste) {
    const div = document.getElementById("listeMec");
    if (liste.length === 0) {
        div.innerHTML = "<p class='chargement'>Aucun mécanicien trouvé</p>";
        return;
    }
    div.innerHTML = liste.map(m => `
        <div class="carte-mec">
            <h3>🔧 ${m.nom}</h3>
            <p>📍 ${m.quartier}</p>
            <p>📞 <a class="tel" href="tel:${m.telephone}">${m.telephone}</a></p>
            <p>📝 ${m.description || ""}</p>
            <span class="badge">${m.specialite}</span>
        </div>
    `).join("");
}

function filtrer() {
    const terme = document.getElementById("recherche")
        .value.toLowerCase();
    const resultats = tousLesMecs.filter(m =>
        m.nom.toLowerCase().includes(terme) ||
        m.quartier.toLowerCase().includes(terme)
    );
    afficherListe(resultats);
}

function mettreAJourStats(liste) {
    document.getElementById("totalMec").textContent = liste.length;
    const quartiers = [...new Set(liste.map(m => m.quartier))];
    document.getElementById("totalQuartiers").textContent = quartiers.length;
    const services = [...new Set(liste.map(m => m.specialite))];
    document.getElementById("totalServices").textContent = services.length;
}

chargerMecaniciens();
</script>
</body>
</html>
